<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System</title>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div id="admin-login" class="h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl shadow-lg w-96 text-center">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Login</h2>
            <input type="email" id="adm-email" placeholder="อีเมลแอดมิน" class="w-full p-3 mb-4 border rounded outline-none focus:border-indigo-500">
            <input type="password" id="adm-pw" placeholder="รหัสผ่าน" class="w-full p-3 mb-6 border rounded outline-none focus:border-indigo-500">
            <button onclick="loginAdmin()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700">เข้าสู่ระบบ</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden h-screen flex flex-col">
        <header class="bg-indigo-900 text-white p-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">RS Admin Dashboard</h1>
            <div class="flex gap-4">
                <button onclick="logoutAdmin()" class="text-red-400 font-bold hover:text-red-300">ออกจากระบบ</button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <div class="w-64 bg-white shadow-lg p-4 flex flex-col gap-2 border-r">
                <button onclick="showTab('users')" class="p-3 bg-gray-100 hover:bg-gray-200 rounded text-left font-bold text-gray-700">👥 จัดการสมาชิก</button>
                <button onclick="showTab('withdraw')" class="p-3 bg-gray-100 hover:bg-gray-200 rounded text-left font-bold text-gray-700">💰 รอถอนเงิน</button>
                <button onclick="showTab('announce')" class="p-3 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 rounded text-left font-bold text-indigo-700">📢 ส่งประกาศให้ลูกค้า</button>
            </div>

            <div class="flex-1 p-8 overflow-y-auto">
                <div id="tab-users" class="tab-content active space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800">จัดการผู้เล่น</h2>
                    <div class="bg-white p-4 rounded-lg shadow" id="users-list">กำลังโหลด...</div>
                </div>

                <div id="tab-withdraw" class="tab-content hidden space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800">คิวถอนเงิน</h2>
                    <div class="bg-white p-4 rounded-lg shadow" id="withdraw-list">กำลังโหลด...</div>
                </div>

                <div id="tab-announce" class="tab-content hidden space-y-4">
                    <h2 class="text-2xl font-bold text-gray-800">ส่งประกาศฉุกเฉิน / แจ้งโปรโมชั่น</h2>
                    <div class="bg-white p-6 rounded-lg shadow max-w-2xl">
                        <label class="block text-sm font-bold text-gray-700 mb-2">ข้อความประกาศ (จะเด้งขึ้นหน้าจอลูกค้าทุกคนที่ออนไลน์)</label>
                        <textarea id="announce-msg" rows="4" class="w-full p-3 border rounded-lg mb-4 outline-none focus:border-indigo-500" placeholder="เช่น ระบบจะปิดปรับปรุง 5 นาที..."></textarea>
                        <button onclick="sendAnnouncement()" class="bg-indigo-600 text-white px-6 py-2 rounded font-bold hover:bg-indigo-700">ส่งประกาศเดี๋ยวนี้</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Login System
        function loginAdmin() {
            const e = document.getElementById('adm-email').value;
            const p = document.getElementById('adm-pw').value;
            auth.signInWithEmailAndPassword(e, p).catch(err => Swal.fire('Error', err.message, 'error'));
        }

        function logoutAdmin() {
            auth.signOut().then(() => location.reload());
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                // เช็คว่าเป็น admin จริงไหม
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists && doc.data().role === 'admin') {
                        document.getElementById('admin-login').classList.add('hidden');
                        document.getElementById('admin-dashboard').classList.remove('hidden');
                        loadAdminData();
                    } else {
                        Swal.fire('ปฏิเสธ', 'คุณไม่ใช่แอดมิน', 'error').then(() => auth.signOut());
                    }
                });
            } else {
                document.getElementById('admin-login').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        // Tabs
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + id).classList.remove('hidden');
        }

        // Load Data
        function loadAdminData() {
            // Users
            db.collection('users').onSnapshot(snap => {
                let html = '<table class="w-full text-left"><tr class="border-b"><th>Email</th><th>Balance</th><th>Role</th><th>จัดการ</th></tr>';
                snap.forEach(doc => {
                    const u = doc.data();
                    html += `<tr class="border-b"><td class="p-2">${u.email}</td><td class="p-2 font-bold text-green-600">฿${u.balance||0}</td><td class="p-2">${u.role||'user'}</td>
                    <td class="p-2"><button onclick="addMoney('${doc.id}', ${u.balance||0})" class="bg-blue-500 text-white px-2 py-1 rounded text-xs">เพิ่มเงิน</button></td></tr>`;
                });
                document.getElementById('users-list').innerHTML = html + '</table>';
            });

            // Withdraws
            db.collection('transactions').where('status','==','pending').onSnapshot(snap => {
                let html = '<table class="w-full text-left"><tr class="border-b"><th>User</th><th>Amount</th><th>Bank</th><th>จัดการ</th></tr>';
                snap.forEach(doc => {
                    const t = doc.data();
                    html += `<tr class="border-b"><td class="p-2">${t.name}</td><td class="p-2 text-red-500 font-bold">฿${t.amount}</td><td class="p-2">${t.bankName} - ${t.bankAcc}</td>
                    <td class="p-2"><button onclick="approveWD('${doc.id}')" class="bg-green-500 text-white px-2 py-1 rounded text-xs">อนุมัติ</button></td></tr>`;
                });
                document.getElementById('withdraw-list').innerHTML = html === '<table class="w-full text-left"><tr class="border-b"><th>User</th><th>Amount</th><th>Bank</th><th>จัดการ</th></tr>' ? 'ไม่มีคิวถอน' : html + '</table>';
            });
        }

        async function addMoney(uid, current) {
            const { value: amount } = await Swal.fire({title: 'เพิ่ม/ลด เงิน', input: 'number', inputValue: current});
            if (amount) db.collection('users').doc(uid).update({balance: Number(amount)});
        }

        function approveWD(id) {
            db.collection('transactions').doc(id).update({status: 'success'});
        }

        // ส่งประกาศ (Announcement)
        function sendAnnouncement() {
            const msg = document.getElementById('announce-msg').value;
            if (!msg) return;
            db.collection('settings').doc('system').set({
                announcement: msg,
                timestamp: new Date().getTime() // ใช้ timestamp เพื่อบังคับเด้ง
            }).then(() => {
                Swal.fire('สำเร็จ', 'ส่งประกาศไปยังหน้าจอผู้เล่นทุกคนแล้ว', 'success');
                document.getElementById('announce-msg').value = '';
            });
        }
    </script>
</body>
</html>
