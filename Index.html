<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSP | Admin Panel</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card-dark { background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        .tab-page { display: none; }
        .tab-page.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="loader" class="fixed inset-0 bg-[#0f172a] z-[9999] flex flex-col items-center justify-center">
        <i class="fas fa-shield-alt text-6xl text-amber-500 mb-4 animate-pulse"></i>
        <h1 class="text-2xl font-black text-white">ระบบจัดการหลังบ้าน</h1>
    </div>

    <div id="login-screen" class="hidden flex-1 flex flex-col justify-center items-center p-4">
        <div class="card-dark w-full max-w-md p-8 text-center shadow-2xl border-t-4 border-t-amber-500">
            <i class="fas fa-user-shield text-5xl text-amber-500 mb-4"></i>
            <h2 class="text-3xl font-black text-white mb-6">ADMIN LOGIN</h2>
            <input type="email" id="admin-email" placeholder="อีเมลแอดมิน" class="w-full p-4 mb-4 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
            <input type="password" id="admin-pw" placeholder="รหัสผ่าน" class="w-full p-4 mb-6 bg-[#0f172a] border border-slate-700 rounded-xl text-white outline-none focus:border-amber-500">
            <button onclick="adminLogin()" class="w-full bg-amber-500 text-slate-900 font-bold py-4 rounded-xl hover:bg-amber-400 transition text-lg">เข้าสู่ระบบหลังบ้าน</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden flex-1 flex flex-col md:flex-row">
        
        <div class="w-full md:w-64 bg-[#1e293b] border-r border-slate-700 p-4 flex flex-col">
            <div class="text-center mb-8 mt-4">
                <h2 class="text-2xl font-black text-white">RSP<span class="text-amber-500">.</span></h2>
                <p class="text-amber-500 text-sm font-bold tracking-widest uppercase">Admin Panel</p>
            </div>
            
            <nav class="flex-1 space-y-2">
                <button onclick="switchMenu('users')" id="btn-menu-users" class="w-full flex items-center p-3 text-slate-300 hover:bg-slate-800 hover:text-amber-500 rounded-lg transition text-left font-medium">
                    <i class="fas fa-users w-8"></i> จัดการผู้เล่น
                </button>
                <button onclick="switchMenu('withdraw')" id="btn-menu-withdraw" class="w-full flex items-center p-3 text-slate-300 hover:bg-slate-800 hover:text-amber-500 rounded-lg transition text-left font-medium">
                    <i class="fas fa-money-bill-wave w-8"></i> รายการถอนเงิน
                </button>
            </nav>
            
            <button onclick="logout()" class="mt-auto w-full flex items-center p-3 text-red-400 hover:bg-red-500/10 rounded-lg transition text-left font-medium">
                <i class="fas fa-sign-out-alt w-8"></i> ออกจากระบบ
            </button>
        </div>

        <div class="flex-1 p-4 md:p-8 overflow-y-auto bg-[#0f172a]">
            
            <div id="page-users" class="tab-page active">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white"><i class="fas fa-users text-amber-500 mr-2"></i>รายชื่อผู้เล่นทั้งหมด</h2>
                    <button onclick="loadUsers()" class="bg-slate-800 p-2 rounded-lg text-slate-300 hover:text-white"><i class="fas fa-sync-alt"></i> รีเฟรช</button>
                </div>
                
                <div class="card-dark overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/50 text-slate-400 text-sm uppercase tracking-wider">
                                <th class="p-4 border-b border-slate-700">ชื่อผู้เล่น (อีเมล)</th>
                                <th class="p-4 border-b border-slate-700 text-right">ยอดเงิน (฿)</th>
                                <th class="p-4 border-b border-slate-700 text-center">โอกาสชนะ (%)</th>
                                <th class="p-4 border-b border-slate-700 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="page-withdraw" class="tab-page">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-white"><i class="fas fa-money-bill-wave text-amber-500 mr-2"></i>คำขอถอนเงิน (รอดำเนินการ)</h2>
                    <button onclick="loadWithdrawals()" class="bg-slate-800 p-2 rounded-lg text-slate-300 hover:text-white"><i class="fas fa-sync-alt"></i> รีเฟรช</button>
                </div>

                <div class="card-dark overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/50 text-slate-400 text-sm uppercase tracking-wider">
                                <th class="p-4 border-b border-slate-700">เวลา / ชื่อผู้เล่น</th>
                                <th class="p-4 border-b border-slate-700 text-amber-500">ยอดถอน (฿)</th>
                                <th class="p-4 border-b border-slate-700">ข้อมูลบัญชีธนาคาร</th>
                                <th class="p-4 border-b border-slate-700 text-center">การตัดสินใจ</th>
                            </tr>
                        </thead>
                        <tbody id="withdraw-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // 1. เชื่อมต่อ Firebase
        const firebaseConfig = { apiKey: "AIzaSyDaeVJ1mUxjm1gG4GMTfZyqJsjImiISzPI", projectId: "gaga-1eb83" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. ซ่อน Loader เริ่มต้น
        setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 1000);

        // 3. ตรวจสอบสถานะแอดมิน
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (doc.exists && doc.data().role === 'admin') {
                        // เป็นแอดมินตัวจริง เข้าใช้งานได้
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('admin-dashboard').classList.remove('hidden');
                        document.getElementById('admin-dashboard').classList.add('flex');
                        loadUsers();
                        loadWithdrawals();
                    } else {
                        // ไม่ใช่แอดมิน เตะออก
                        Swal.fire({title: 'ปฏิเสธการเข้าถึง', text: 'บัญชีนี้ไม่ใช่ระดับแอดมิน', icon: 'error', background: '#1e293b', color: '#fff'});
                        auth.signOut();
                    }
                } catch(e) { console.error(e); auth.signOut(); }
            } else {
                // กลับไปหน้าล็อกอิน
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('login-screen').classList.add('flex');
                document.getElementById('admin-dashboard').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('flex');
            }
        });

        // 4. ระบบล็อกอิน
        function adminLogin() {
            const e = document.getElementById('admin-email').value.trim();
            const p = document.getElementById('admin-pw').value;
            if(!e || !p) return Swal.fire({title: 'ใส่ข้อมูลให้ครบ', icon: 'warning', background: '#1e293b', color: '#fff'});
            Swal.showLoading();
            auth.signInWithEmailAndPassword(e, p).then(() => Swal.close()).catch(() => Swal.fire({title: 'รหัสผิดพลาด', icon: 'error', background: '#1e293b', color: '#fff'}));
        }

        function logout() { auth.signOut(); }

        // 5. สลับเมนู
        function switchMenu(page) {
            document.querySelectorAll('.tab-page').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            
            // เปลี่ยนสีปุ่มเมนู
            document.getElementById('btn-menu-users').classList.replace('text-amber-500', 'text-slate-300');
            document.getElementById('btn-menu-withdraw').classList.replace('text-amber-500', 'text-slate-300');
            document.getElementById('btn-menu-' + page).classList.replace('text-slate-300', 'text-amber-500');

            if(page === 'users') loadUsers();
            if(page === 'withdraw') loadWithdrawals();
        }

        // ==========================================
        // 👥 ระบบจัดการผู้เล่น (USERS)
        // ==========================================
        async function loadUsers() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400"><i class="fas fa-spinner fa-spin"></i> กำลังโหลด...</td></tr>';
            
            try {
                const snapshot = await db.collection('users').get();
                tbody.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const winRate = data.winRate !== undefined ? data.winRate : 35; // ค่าเริ่มต้น 35%
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/50 transition border-b border-slate-700/50">
                            <td class="p-4">
                                <div class="font-bold text-white">${data.name || 'ไม่มีชื่อ'} ${data.role === 'admin' ? '<span class="bg-amber-500 text-xs text-black px-2 py-1 rounded ml-2">Admin</span>' : ''}</div>
                                <div class="text-sm text-slate-400">${data.email}</div>
                            </td>
                            <td class="p-4 text-right font-bold text-green-400 text-lg">
                                ${(data.balance || 0).toLocaleString()} ฿
                            </td>
                            <td class="p-4 text-center text-amber-500 font-bold">
                                ${winRate}%
                            </td>
                            <td class="p-4 text-center space-x-2">
                                <button onclick="editBalance('${doc.id}', ${data.balance || 0}, '${data.name}')" class="bg-green-600/20 text-green-400 px-3 py-1 rounded hover:bg-green-600 hover:text-white transition text-sm"><i class="fas fa-coins"></i> เติม/ลบ เงิน</button>
                                <button onclick="editWinRate('${doc.id}', ${winRate}, '${data.name}')" class="bg-blue-600/20 text-blue-400 px-3 py-1 rounded hover:bg-blue-600 hover:text-white transition text-sm"><i class="fas fa-sliders-h"></i> ปรับโอกาสชนะ</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-400">โหลดข้อมูลล้มเหลว</td></tr>';
            }
        }

        async function editBalance(uid, currentBalance, name) {
            const { value: amount } = await Swal.fire({
                title: `จัดการเงิน: ${name}`,
                input: 'number',
                inputLabel: 'ใส่จำนวนเงิน (ใส่เลขลบเพื่อหักเงิน เช่น -100)',
                inputPlaceholder: 'จำนวนเงิน...',
                showCancelButton: true, background: '#1e293b', color: '#fff', confirmButtonColor: '#22c55e'
            });

            if (amount) {
                Swal.showLoading();
                await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(Number(amount)) });
                Swal.fire({title: 'สำเร็จ', icon: 'success', background: '#1e293b', color: '#fff', timer: 1500});
                loadUsers();
            }
        }

        async function editWinRate(uid, currentRate, name) {
            const { value: rate } = await Swal.fire({
                title: `ปรับโอกาสชนะ: ${name}`,
                input: 'number',
                inputLabel: 'ใส่เปอร์เซ็นต์ (0 - 100)',
                inputValue: currentRate,
                showCancelButton: true, background: '#1e293b', color: '#fff', confirmButtonColor: '#3b82f6',
                inputValidator: (value) => {
                    if (value < 0 || value > 100) return 'กรุณาใส่ตัวเลข 0 ถึง 100 เท่านั้น!';
                }
            });

            if (rate) {
                Swal.showLoading();
                await db.collection('users').doc(uid).update({ winRate: Number(rate) });
                Swal.fire({title: 'สำเร็จ', icon: 'success', background: '#1e293b', color: '#fff', timer: 1500});
                loadUsers();
            }
        }

        // ==========================================
        // 💸 ระบบจัดการถอนเงิน (WITHDRAWALS)
        // ==========================================
        async function loadWithdrawals() {
            const tbody = document.getElementById('withdraw-table-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400"><i class="fas fa-spinner fa-spin"></i> กำลังโหลด...</td></tr>';
            
            try {
                const snapshot = await db.collection('transactions')
                    .where('type', '==', 'withdraw')
                    .where('status', '==', 'pending')
                    .get();
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-slate-500">✅ ไม่มีคำขอถอนเงินค้างอยู่</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/50 transition border-b border-slate-700/50">
                            <td class="p-4">
                                <div class="text-sm text-slate-400">${data.dateStr}</div>
                                <div class="font-bold text-white">${data.name}</div>
                            </td>
                            <td class="p-4 font-black text-amber-500 text-xl">
                                ${data.amount.toLocaleString()} ฿
                            </td>
                            <td class="p-4 text-blue-300 font-mono">
                                ${data.bankAcc}
                            </td>
                            <td class="p-4 text-center space-x-2">
                                <button onclick="approveWithdraw('${doc.id}', '${data.name}', ${data.amount})" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-500 transition font-bold shadow-lg">อนุมัติ</button>
                                <button onclick="rejectWithdraw('${doc.id}', '${data.uid}', ${data.amount})" class="bg-[#0f172a] border border-red-500/50 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500 hover:text-white transition">ยกเลิก/คืนเงิน</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-red-400">โหลดข้อมูลล้มเหลว กรุณาตั้ง Firebase Index (ถ้ามีแจ้งเตือนใน Console)</td></tr>';
            }
        }

        async function approveWithdraw(docId, name, amount) {
            Swal.fire({
                title: 'ยืนยันการโอนเงินแล้ว?',
                text: `คุณโอนเงิน ${amount} บาท ให้ ${name} เรียบร้อยแล้วใช่ไหม?`,
                icon: 'question', showCancelButton: true, confirmButtonText: 'ใช่, อนุมัติเลย',
                background: '#1e293b', color: '#fff', confirmButtonColor: '#22c55e'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.showLoading();
                    await db.collection('transactions').doc(docId).update({ status: 'approved' });
                    Swal.fire({title: 'อนุมัติสำเร็จ', icon: 'success', background: '#1e293b', color: '#fff', timer: 1500});
                    loadWithdrawals();
                }
            });
        }

        async function rejectWithdraw(docId, uid, amount) {
            Swal.fire({
                title: 'ยกเลิกการถอนเงิน?',
                text: `เงิน ${amount} บาท จะถูกคืนกลับเข้ากระเป๋าของลูกค้าทันที`,
                icon: 'warning', showCancelButton: true, confirmButtonText: 'ยืนยันการยกเลิก',
                background: '#1e293b', color: '#fff', confirmButtonColor: '#ef4444'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    Swal.showLoading();
                    // 1. คืนเงินลูกค้า
                    await db.collection('users').doc(uid).update({ balance: firebase.firestore.FieldValue.increment(amount) });
                    // 2. เปลี่ยนสถานะบิลเป็นยกเลิก
                    await db.collection('transactions').doc(docId).update({ status: 'rejected' });
                    Swal.fire({title: 'ยกเลิกและคืนเงินแล้ว', icon: 'success', background: '#1e293b', color: '#fff', timer: 1500});
                    loadWithdrawals();
                }
            });
        }

        // เริ่มต้นด้วยหน้า User
        switchMenu('users');
    </script>
</body>
</html>
